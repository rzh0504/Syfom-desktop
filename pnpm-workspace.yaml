packages:
  - .

overrides:
  icon-gen: 3.0.0
  degenerator: 2.2.0
  electron-builder: ^23.0.0

# Legacy dependency `discord-rich-presence` pulls `discord-rpc` from git.
# Keep this unblocked until the Electron/Vue 3 migration can replace it.
blockExoticSubdeps: false

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - core-js
  - ejs
  - electron
  - es5-ext
  - esbuild
  - husky
  - sharp
  - yorkie

ignoredBuiltDependencies:
  - register-scheme

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  ejs: true
  electron: true
  es5-ext: true
  esbuild: true
  husky: true
  register-scheme: false
  sharp: true
  usocket: false
  yorkie: true
